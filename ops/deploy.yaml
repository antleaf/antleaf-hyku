replicaCount: 1

resources:
  limits:
    memory: 2Gi
    cpu: 250m
  requests:
    memory: 1Gi
    cpu: 100m

livenessProbe:
  enabled: false
readinessProbe:
  enabled: false

brandingVolume:
  storageClass: nfs
  size: 2Gi
derivativesVolume:
  storageClass: nfs
  size: 5Gi
uploadsVolume:
  storageClass: nfs
  size: 2Gi

extraVolumeMounts: &volMounts
  - name: uploads
    mountPath: /app/samvera/hyrax-webapp/tmp/imports
    subPath: imports
  - name: uploads
    mountPath: /app/samvera/hyrax-webapp/tmp/exports
    subPath: exports
  - name: uploads
    mountPath: /app/samvera/hyrax-webapp/public/system
    subPath: public-system
  - name: uploads
    mountPath: /app/samvera/hyrax-webapp/public/uploads
    subPath: public-uploads
  - name: uploads
    mountPath: /app/samvera/hyrax-webapp/tmp/network_files
    subPath: network-files
  - name: uploads
    mountPath: /app/samvera/hyrax-webapp/storage/files
    subPath: storage-files
  - name: uploads
    mountPath: /app/samvera/hyrax-webapp/log/rack_attack
    subPath: rack-attack

ingress:
  enabled: true
  ingressClassName: "nginx"
  hosts:
    - host: antleaf-hyku.antleaf.com
      paths:
        - path: /
          pathType: ImplementationSpecific
    - host: "test.antleaf-hyku.antleaf.com"
      paths:
        - path: /
          pathType: ImplementationSpecific

  annotations:
    {
      nginx.org/client-max-body-size: "0",
      cert-manager.io/cluster-issuer: letsencrypt-prod,
    }
  tls:
    - hosts:
        - antleaf-hyku.antleaf.com
        - test.antleaf-hyku.antleaf.com
      secretName: antleaf-hyku-tls

extraEnvVars: &envVars
  - name: CONFDIR
    value: /app/samvera/hyrax-webapp/solr/conf
  - name: DB_ADAPTER
    value: postgresql
  - name: DB_HOST
    value: hyku-postgresql
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: hyrax
  - name: DB_USER
    value: hyrax
  - name: FCREPO_BASE_PATH
    value: /hykudemo
  - name: FCREPO_HOST
    value: hyku-fcrepo
  - name: FCREPO_PORT
    value: "8080"
  - name: FCREPO_REST_PATH
    value: rest
  - name: GOOGLE_ACCOUNT_JSON
    value: ""
  - name: GOOGLE_ANALYTICS_ID
    value: ""
  - name: GOOGLE_ANALYTICS_PROPERTY_ID
    value: ""
  - name: GOOGLE_OAUTH_APP_NAME
    value: hyku-demo
  - name: GOOGLE_OAUTH_APP_VERSION
    value: "1.0"
  - name: GOOGLE_OAUTH_PRIVATE_KEY_SECRET
    value: ""
  - name: GOOGLE_OAUTH_PRIVATE_KEY_PATH
    value: prod-cred.p12
  - name: GOOGLE_OAUTH_PRIVATE_KEY_VALUE
    value: ""
  - name: GOOGLE_OAUTH_CLIENT_EMAIL
    value: hyku-demo@hyku-demo.iam.gserviceaccount.com
  - name: INITIAL_ADMIN_EMAIL
    value: support@antleaf.com
  - name: INITIAL_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: hyku-secrets
        key: INITIAL_ADMIN_PASSWORD
  - name: IN_DOCKER
    value: "true"
  - name: LD_LIBRARY_PATH
    value: /app/fits/tools/mediainfo/linux
  - name: PASSENGER_APP_ENV
    value: production
  - name: RAILS_CACHE_STORE_URL
    value: redis://:redis-password@hyku-redis-master:6379/0
  - name: RAILS_ENV
    value: production
  - name: RAILS_LOG_TO_STDOUT
    value: "true"
  - name: RAILS_MAX_THREADS
    value: "5"
  - name: RAILS_SERVE_STATIC_FILES
    value: "true"
  - name: REDIS_HOST
    value: hyku-redis-master
  - name: REDIS_URL
    value: redis://:redis-password@hyku-redis-master:6379/0
  - name: HYRAX_ACTIVE_JOB_QUEUE
    value: good_job
  - name: HYKU_BULKRAX_ENABLED
    value: "true"
  - name: HYKU_CONTACT_EMAIL
    value: support@antleaf.com
  - name: HYKU_FILE_ACL
    value: "false"
  - name: HYRAX_ANALYTICS
    value: "false"
  - name: HYRAX_ANALYTICS_PROVIDER
    value: ga4
  - name: HYRAX_ANALYTICS_REPORTING
    value: "false"
  - name: HYRAX_FITS_PATH
    value: /app/fits/fits.sh
  - name: HYRAX_FLEXIBLE
    value: "true"
  - name: HYRAX_VALKYRIE
    value: "true"
  - name: HYKU_ADMIN_HOST
    value: antleaf-hyku.antleaf.com
  - name: HYKU_ADMIN_ONLY_TENANT_CREATION
    value: "true"
  - name: HYKU_BLOCK_VALKYRIE_REDIRECT
    value: "false"
  - name: HYKU_ALLOW_SIGNUP
    value: "false"
  - name: HYKU_DEFAULT_HOST
    value: "%{tenant}.antleaf-hyku.antleaf.com"
  - name: HYKU_FOOTER_EXTRA
    value: "Sponsored by <a href='https://antleaf.com' class='navbar-link' target='_blank'>Antleaf</a>"
  - name: HYKU_MULTITENANT
    value: "true"
  - name: HYKU_ROOT_HOST
    value: antleaf-hyku.antleaf.com
  - name: HYKU_SHOW_BACKTRACE
    value: "true"
  - name: HYKU_USER_DEFAULT_PASSWORD
    value: password
  - name: SMTP_ADDRESS
    value: smtp.gmail.com
#    value: maildev-smtp.maildev.svc.cluster.local
  - name: SMTP_DOMAIN
    value: antleaf.com
#    value: maildev-smtp.maildev.svc.cluster.local
  - name: SMTP_ENABLED
    value: "true"
  - name: SMTP_PORT
    value: "587"
  - name: SMTP_TYPE
    value: plain
  - name: SMTP_USER_NAME
    value: "support@antleaf.com"
  - name: SMTP_PASSWORD
    valueFrom:
      secretKeyRef:
        name: hyku-secrets
        key: SMTP_PASSWORD
  - name: SMTP_STARTTLS
    value: "false"
  - name: SOLR_ADMIN_USER
    value: admin
  - name: SOLR_ADMIN_PASSWORD
    value: SolrRocks
  - name: SOLR_COLLECTION_NAME
    value: hyku-demo
  - name: SOLR_CONFIGSET_NAME
    value: hyku-demo
  - name: SOLR_HOST
    value: hyku-solr
  - name: SOLR_PORT
    value: "8983"
  - name: SOLR_URL
    value: http://admin:SolrRocks@hyku-solr:8983/solr/
  - name: SECRET_KEY_BASE
    value: local-secret-key-base-change-me
  - name: SENTRY_DSN
    value: ""
  - name: SENTRY_ENVIRONMENT
    value: local
  - name: VALKYRIE_TRANSITION
    value: "true"

worker:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      memory: 2Gi
      cpu: 250m
    requests:
      memory: 1Gi
      cpu: 100m
  extraVolumeMounts: *volMounts
  extraEnvVars: *envVars
  podSecurityContext:
    runAsUser: 1001
    runAsGroup: 101
    fsGroup: 101
    fsGroupChangePolicy: OnRootMismatch

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 101
  fsGroup: 101
  fsGroupChangePolicy: OnRootMismatch

embargoRelease:
  enabled: false
leaseRelease:
  enabled: false

fcrepo:
  enabled: true
  healthCheck:
    initialDelay: 120
  resources:
    limits:
      memory: 2Gi
      cpu: 500m
    requests:
      memory: 1Gi
      cpu: 256m
  persistence:
    enabled: true
fits:
  enabled: true
  resources:
    limits:
      memory: 1Gi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 100m

postgresql:
  enabled: true
  auth:
    database: hyrax
    postgresPassword: postgres
    password: hyrax_pass
    username: hyrax
  primary:
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 128Mi
        cpu: 100m
    initdb:
      user: postgres
      password: postgres
      scripts:
        01-hyku-extensions.sql: |
          ALTER USER hyrax WITH SUPERUSER;
          CREATE SCHEMA IF NOT EXISTS shared_extensions;
          CREATE EXTENSION IF NOT EXISTS hstore SCHEMA shared_extensions;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp" SCHEMA shared_extensions;
          CREATE EXTENSION IF NOT EXISTS pgcrypto SCHEMA shared_extensions;
          GRANT USAGE ON SCHEMA shared_extensions TO public;

redis:
  enabled: true
  architecture: standalone
  auth:
    password: redis-password
  master:
    resources:
      limits:
        memory: 256Mi
        cpu: 100m
      requests:
        memory: 128Mi
        cpu: 50m
#  replica:
#    resources:
#      limits:
#        memory: 256Mi
#        cpu: 100m
#      requests:
#        memory: 128Mi
#        cpu: 50m

solr:
  enabled: true
  replicaCount: 1
  collectionShards: 1
  collectionReplicas: 1
  resources:
    limits:
      memory: 2Gi
      cpu: 500m
    requests:
      memory: 1Gi
      cpu: 100m
  extraEnvVars:
    - name: JAVA_TOOL_OPTIONS
      value: -Xshare:off
  startupProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 15
    failureThreshold: 24
  livenessProbe:
    initialDelaySeconds: 300
    failureThreshold: 12
  readinessProbe:
    initialDelaySeconds: 120
    failureThreshold: 18
  containerPorts:
    http: 8983
  auth:
    enabled: true
    adminUsername: admin
    adminPassword: SolrRocks
  coreNames: hyku-demo
  collection: ""
  cloudBootstrap: true
  cloudEnabled: true
  persistence:
    enabled: true
  zookeeper:
    enabled: true
    replicaCount: 1
    resources:
      limits:
        memory: 1Gi
        cpu: 250m
      requests:
        memory: 256Mi
        cpu: 100m
    persistence:
      enabled: true

#externalFcrepoHost: hyku-fcrepo

#externalPostgresql:
#  host: hyku-postgresql
#  username: hyrax
#  password: hyrax_pass
#
#externalSolrHost: hyku-solr
#externalSolrPort: "8983"
#externalSolrUser: admin
#externalSolrCollection: hyku-demo
#externalSolrPassword: SolrRocks

global:
  postgresql:
    auth:
      postgresPassword: postgres
      username: hyrax
      password: hyrax_pass
  hyraxName: hyku-demo-hyrax

nginx:
  enabled: false
  service:
    port: 80
